name: Deploy Web Application

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            if [ ! -d "/opt/telegram-chain-bot/.git" ]; then
                echo "Repository not found at /opt/telegram-chain-bot. Initializing..."
                mkdir -p /opt/telegram-chain-bot
                rm -rf /opt/telegram-chain-bot/* /opt/telegram-chain-bot/.* 2>/dev/null || true
                git clone https://github.com/geniusjunmin/telegram-chain-bot.git /opt/telegram-chain-bot
            fi
            cd /opt/telegram-chain-bot
            git fetch origin
            git reset --hard origin/main
            mkdir -p data backups
            sudo chown -R 1654:1654 data backups || chmod -R 777 data backups || true
            docker compose -f docker/docker-compose.yml pull
            docker compose -f docker/docker-compose.yml build --pull
            docker compose -f docker/docker-compose.yml up -d --remove-orphans
            docker image prune -f
            docker compose -f docker/docker-compose.yml ps
