services:
  telegram-chain-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: telegram-chain-bot
    environment:
      BOT_TOKEN: "${BOT_TOKEN}"
      WEBHOOK_BASE_URL: "${WEBHOOK_BASE_URL}"
      WEBHOOK_PATH: "/telegram/webhook"
      TELEGRAM_WEBHOOK_SECRET: "${TELEGRAM_WEBHOOK_SECRET}"
      BOT_OWNER_IDS: "${BOT_OWNER_IDS}"
      SQLITE_PATH: "/app/data/chain.db"
      BACKUP_PATH: "/app/data/backups"
      ASPNETCORE_ENVIRONMENT: "Production"
      INITIAL_ADMIN_USERNAME: "${INITIAL_ADMIN_USERNAME}"
      INITIAL_ADMIN_PASSWORD: "${INITIAL_ADMIN_PASSWORD}"
      INITIAL_ADMIN_PASSWORD_FILE: "${INITIAL_ADMIN_PASSWORD_FILE}"
      ADMIN_COOKIE_HOURS: "${ADMIN_COOKIE_HOURS}"
      ADMIN_LOGIN_MAX_ATTEMPTS: "${ADMIN_LOGIN_MAX_ATTEMPTS}"
      ADMIN_LOCKOUT_MINUTES: "${ADMIN_LOCKOUT_MINUTES}"
      TELEGRAM_INIT_DATA_MAX_AGE_SECONDS: "${TELEGRAM_INIT_DATA_MAX_AGE_SECONDS}"
      REQUIRE_MFA_FOR_SUPERADMIN: "${REQUIRE_MFA_FOR_SUPERADMIN}"
    networks:
      - web-network
    volumes:
      - ../data:/app/data
      - ../backups:/app/backups
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          memory: 128M

networks:
  web-network:
    external: true
