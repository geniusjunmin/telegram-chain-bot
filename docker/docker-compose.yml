services:
  telegram-chain-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: telegram-chain-bot
    environment:
      BOT_TOKEN: "${BOT_TOKEN}"
      WEBHOOK_BASE_URL: "${WEBHOOK_BASE_URL}"
      WEBHOOK_PATH: "/telegram/webhook"
      TELEGRAM_WEBHOOK_SECRET: "${TELEGRAM_WEBHOOK_SECRET}"
      BOT_OWNER_IDS: "${BOT_OWNER_IDS}"
      SQLITE_PATH: "/app/data/chain.db"
      BACKUP_PATH: "/app/data/backups"
      ASPNETCORE_ENVIRONMENT: "Production"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ../data:/app/data
      - ../backups:/app/backups
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          memory: 128M
